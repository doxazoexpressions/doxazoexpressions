workflows:
  ios-workflow:
    name: Doxazo iOS Workflow

    integrations:
      app_store_connect: DoxazoASC

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.doxazo.expressions
      vars:
        APP_STORE_APPLE_ID: "6785318591"
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Increment build number
        script: |
          #!/bin/sh
          set -e
          cd "$CM_BUILD_DIR/ios/App"
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID")
          NEW_BUILD=$((LATEST_BUILD + 1))
          echo "Using latest TestFlight build $LATEST_BUILD; setting build number to $NEW_BUILD"
          agvtool new-version -all "$NEW_BUILD"

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"


    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
